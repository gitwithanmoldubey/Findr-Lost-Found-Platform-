name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build client
        run: |
          cd client
          npm ci
          npm run build

      - name: Install server dependencies
        run: |
          cd server
          npm ci

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment
        run: echo "Configure VERCEL_DEPLOY_HOOK in repository secrets."

      - name: Trigger Render deployment
        run: echo "Configure RENDER_DEPLOY_HOOK in repository secrets."
